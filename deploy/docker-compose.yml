services:
  # 1. Wireflow Agent (被测主体)
  wf-agent:
    image: ghcr.io/winstonfly/wireflow:e2e
    container_name: wf-agent
    privileged: true
    network_mode: "host"
    restart: always
    volumes:
      - ./config.yaml:/etc/wireflow/config.yaml
    # 假设你的 Agent 支持通过命令行指定 Metrics 监听端口
    command: ["/usr/local/bin/wireflow-agent", "--config", "/etc/wireflow/config.yaml", "--metrics-addr", ":9100"]

  # 2. vmagent (数据采集器)
  # 它负责从 wf-agent 抓取数据并推送到后端
  vmagent:
    image: victoriametrics/vmagent:v1.99.0
    container_name: wf-vmagent
    depends_on:
      - wf-agent
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-remoteWrite.url=http://victoria-metrics:8428/api/v1/write"
    restart: always

  # 3. VictoriaMetrics (时序数据库)
  # 存数据的地方，比 Prometheus 占用更少的内存和磁盘
  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.99.0
    container_name: wf-storage
    ports:
      - "8428:8428"
    volumes:
      - vmdata:/storage
    restart: always

  # 4. Grafana (可视化面板)
  # 你的“临时 UI”，用来观察延迟和流量波动
  grafana:
    image: grafana/grafana:latest
    container_name: wf-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # 默认账号 admin/admin
    restart: always

volumes:
  vmdata: