# wireflowd 需要 cluster-admin 权限以管理 CRD 实例和 RBAC
# 注意：kustomize namePrefix 不会自动更新 subjects[].name，
# 因此此处直接使用 SA 的最终名称 (namePrefix + metadata.name)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: controller-admin  # namePrefix 后: wireflow-controller-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: wireflow-controller-admin   # 最终名称（namePrefix: wireflow- + controller-admin）
    namespace: wireflow-system
