---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  ports:
    - protocol: TCP
      name: http
      port: 8080
      targetPort: 8080
    - protocol: TCP
      name: grpc
      port: 6060
      targetPort: 6060
  selector:
    k8s-app: lattice-control
  type: ClusterIP
