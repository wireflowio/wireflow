apiVersion: v1
kind: ConfigMap
metadata:
  name: control-config
data:
  wireflow.yaml: |
    app:
      listen: :8080
      name: "WireFlow"
      env: "development"
      init_admins:
        - username: "admin"
          password: "123456"

    jwt:
      secret: "your-super-secret-key"
      expire_hours: 24

    signaling-url: "nats://wireflow-nats-service.wireflow-system.svc.cluster.local:4222"

