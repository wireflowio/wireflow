version: 1
project_name: wireflow

builds:
  # Edge Agent (bare metal / non-k8s nodes)
  - id: "wireflow"
    binary: "wireflow"
    main: "./cmd/wireflow/main.go"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X wireflow/pkg/version.Version={{.Version}}
      - -X wireflow/pkg/version.GitCommit={{.Commit}}
      - -X wireflow/pkg/version.BuildTime={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  # All-in-One 控制面（嵌入 NATS + SQLite，仅 linux）
  - id: "wireflowd"
    binary: "wireflowd"
    main: "./cmd/wireflowd/main.go"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X wireflow/pkg/version.Version={{.Version}}
      - -X wireflow/pkg/version.GitCommit={{.Commit}}
      - -X wireflow/pkg/version.BuildTime={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  # wireflow agent 打包（面向边缘/终端用户）
  - id: "wireflow-archive"
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - wireflow
    format_overrides:
      - goos: windows
        format: zip

  # wireflowd 单独打包（面向服务端部署）
  - id: "wireflowd-archive"
    name_template: "wireflowd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - wireflowd

checksum:
  name_template: "checksums.txt"

dockers:
  # wireflowd all-in-one 镜像 (amd64)
  - id: "wireflowd-amd64"
    ids:
      - wireflowd
    goos: linux
    goarch: amd64
    image_templates:
      - "ghcr.io/wireflowio/wireflowd:{{ .Version }}-amd64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--build-arg=TARGETSERVICE=wireflowd"
      - "--build-arg=TARGETOS=linux"
      - "--build-arg=TARGETARCH=amd64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--label=org.opencontainers.image.title=wireflowd"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--platform=linux/amd64"

  # wireflowd all-in-one 镜像 (arm64)
  - id: "wireflowd-arm64"
    ids:
      - wireflowd
    goos: linux
    goarch: arm64
    image_templates:
      - "ghcr.io/wireflowio/wireflowd:{{ .Version }}-arm64"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--build-arg=TARGETSERVICE=wireflowd"
      - "--build-arg=TARGETOS=linux"
      - "--build-arg=TARGETARCH=arm64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--label=org.opencontainers.image.title=wireflowd"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .Commit }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/wireflowio/wireflowd:{{ .Version }}"
    image_templates:
      - "ghcr.io/wireflowio/wireflowd:{{ .Version }}-amd64"
      - "ghcr.io/wireflowio/wireflowd:{{ .Version }}-arm64"
  - name_template: "ghcr.io/wireflowio/wireflowd:latest"
    image_templates:
      - "ghcr.io/wireflowio/wireflowd:{{ .Version }}-amd64"
      - "ghcr.io/wireflowio/wireflowd:{{ .Version }}-arm64"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
