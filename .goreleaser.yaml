version: 1
project_name: lattice

builds:
  # Edge Agent (bare metal / non-k8s nodes)
  - id: "lattice"
    binary: "lattice"
    main: "./cmd/lattice/main.go"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X lattice/pkg/version.Version={{.Version}}
      - -X lattice/pkg/version.GitCommit={{.Commit}}
      - -X lattice/pkg/version.BuildTime={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  # All-in-One 控制面（嵌入 NATS + SQLite，仅 linux）
  - id: "latticed"
    binary: "latticed"
    main: "./cmd/latticed/main.go"
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X lattice/pkg/version.Version={{.Version}}
      - -X lattice/pkg/version.GitCommit={{.Commit}}
      - -X lattice/pkg/version.BuildTime={{.Date}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  # lattice agent 打包（面向边缘/终端用户）
  - id: "lattice-archive"
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - lattice
    format_overrides:
      - goos: windows
        format: zip

  # latticed 单独打包（面向服务端部署）
  - id: "latticed-archive"
    name_template: "latticed_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - latticed

nfpms:
  # lattice agent package
  - id: "lattice-nfpms"
    package_name: lattice
    builds:
      - lattice
    vendor: alatticeio
    homepage: https://github.com/alatticeio/lattice
    maintainer: "alatticeio <maintainers@alatticeio.io>"
    description: "Lattice edge agent — secure peer-to-peer networking for Kubernetes and bare metal."
    license: Apache 2.0
    formats:
      - rpm
      - deb
    bindir: /usr/bin
    section: net
    priority: optional
    contents:
      - src: ./packaging/lattice.service
        dst: /usr/lib/systemd/system/lattice.service
      - src: ./packaging/config.yaml
        dst: /etc/lattice/config.yaml
        type: "config|noreplace"
    overrides:
      rpm:
        dependencies:
          - systemd
      deb:
        dependencies:
          - systemd
    scripts:
      postinstall: ./packaging/scripts/lattice-post-install.sh
      postremove: ./packaging/scripts/lattice-post-remove.sh

  # latticed server package
  - id: "latticed-nfpms"
    package_name: latticed
    builds:
      - latticed
    vendor: alatticeio
    homepage: https://github.com/alatticeio/lattice
    maintainer: "alatticeio <maintainers@alatticeio.io>"
    description: "Lattice all-in-one control plane — embedded NATS + SQLite for single-node deployment."
    license: Apache 2.0
    formats:
      - rpm
      - deb
    bindir: /usr/bin
    section: net
    priority: optional
    contents:
      - src: ./packaging/latticed.service
        dst: /usr/lib/systemd/system/latticed.service
    overrides:
      rpm:
        dependencies:
          - systemd
      deb:
        dependencies:
          - systemd
    scripts:
      postinstall: ./packaging/scripts/latticed-post-install.sh
      postremove: ./packaging/scripts/latticed-post-remove.sh

brews:
  - name: lattice
    ids:
      - lattice-archive
    repository:
      owner: alatticeio
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/alatticeio/lattice
    description: "Lattice edge agent — secure peer-to-peer networking"
    license: Apache 2.0
    test: |
      system "#{bin}/lattice", "version"
    install: |
      bin.install "lattice"
    commit_author:
      name: alatticeio-bot
      email: maintainers@alatticeio.io
    skip_upload: false
    dependencies: []

release:
  prerelease: auto

checksum:
  name_template: "checksums.txt"

# Docker 镜像由 release.yml 中独立的 docker-image job 构建和推送，
# goreleaser 只负责 binary/archive/changelog。
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
