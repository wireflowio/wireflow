name: Test README Scripts

# Validates every CLI command documented in README.md, step by step,
# simulating exactly what a real user would run on a fresh machine.
#
# Uses published latticeio images — no build or image import required.
# Setup:  docker run lattice-k3s (k3s + latticed all-in-one, exposes
#         API on 8080 and NATS on 4222)
# Test:   README Steps 1-6

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  SIGNALING_URL: nats://localhost:4222
  SERVER_URL: http://localhost:8080
  AGENT_IMAGE: ghcr.io/alatticeio/lattice:latest
  K3S_IMAGE: ghcr.io/alatticeio/lattice-k3s:latest
  KUBECTL: docker exec lattice-k3s kubectl

permissions:
  contents: read

jobs:
  test-readme-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Start lattice-k3s (k3s + latticed + NATS, all-in-one) ─────────────
      - name: "Start lattice-k3s container"
        run: |
          docker pull "$K3S_IMAGE"
          docker run -d \
            --name lattice-k3s \
            --privileged \
            -p 8080:8080 \
            -p 4222:4222 \
            "$K3S_IMAGE"
          echo "lattice-k3s container started"

      - name: "Wait for k3s + latticed to be ready"
        run: |
          echo "Waiting for K8s API..."
          for i in $(seq 1 120); do
            if $KUBECTL get nodes > /dev/null 2>&1; then
              echo "K8s API ready after ${i}s"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "ERROR: K8s API not ready within 120s"
              docker logs lattice-k3s 2>&1 | tail -30
              exit 1
            fi
            sleep 1
          done

          echo "Waiting for CRDs..."
          for i in $(seq 1 60); do
            if $KUBECTL get crd latticepeers.alattice.io > /dev/null 2>&1; then
              echo "CRDs ready after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: CRDs not ready within 60s"
              $KUBECTL get crd 2>&1 || true
              exit 1
            fi
            sleep 1
          done

          echo "Waiting for Lattice API (http://localhost:8080)..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "Lattice API responded with HTTP $HTTP_CODE after ${i}s"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "ERROR: Lattice API not reachable within 60s"
              docker logs lattice-k3s 2>&1 | tail -30
              exit 1
            fi
            sleep 1
          done

          echo "Waiting for NATS (localhost:4222)..."
          for i in $(seq 1 30); do
            nc -z 127.0.0.1 4222 2>/dev/null && break || true
            sleep 1
          done
          nc -z 127.0.0.1 4222 2>/dev/null \
            && echo "localhost:4222 ready" \
            || { echo "ERROR: localhost:4222 not reachable"; docker logs lattice-k3s 2>&1 | tail -20; exit 1; }

      # ── Use published image as CLI ─────────────────────────────────────────
      # ENTRYPOINT is /app/lattice, so `docker run image <subcommand>` works
      # directly as a CLI. --network host lets it reach localhost:8080 / 4222.

      - name: "Set LATTICE to published image"
        run: |
          docker pull "${AGENT_IMAGE}"
          docker run --rm --network host "${AGENT_IMAGE}" --help | head -5
          echo "LATTICE=docker run --rm --network host ${AGENT_IMAGE}" >> $GITHUB_ENV
          echo "lattice CLI via image: ${AGENT_IMAGE}"

      # ════════════════════════════════════════════════════════════════════════
      # Step 1: Create a workspace
      # ════════════════════════════════════════════════════════════════════════

      - name: "[Step 1a] lattice workspace add"
        run: |
          echo ">>> lattice workspace add dev --display-name Development --signaling-url $SIGNALING_URL"
          WS_OUTPUT=$($LATTICE workspace add dev \
            --display-name "Development" \
            --signaling-url "$SIGNALING_URL")
          echo "$WS_OUTPUT"

          NAMESPACE=$(echo "$WS_OUTPUT" | awk '/namespace:/ {print $2}')
          [[ -n "$NAMESPACE" ]] || { echo "Failed to extract namespace"; exit 1; }
          echo "NAMESPACE=$NAMESPACE" >> $GITHUB_ENV
          echo "Workspace created — namespace=$NAMESPACE"

      - name: "[Step 1b] lattice workspace list"
        run: |
          echo ">>> lattice workspace list --signaling-url $SIGNALING_URL"
          LIST=$($LATTICE workspace list --signaling-url "$SIGNALING_URL")
          echo "$LIST"
          echo "$LIST" | grep -q "$NAMESPACE" \
            && echo "Namespace '$NAMESPACE' visible in list" \
            || { echo "Workspace not found in list"; exit 1; }

      # ════════════════════════════════════════════════════════════════════════
      # Step 2: Create an enrollment token
      # ════════════════════════════════════════════════════════════════════════

      - name: "[Step 2a] lattice token create"
        run: |
          echo ">>> lattice token create dev-team -n $NAMESPACE --limit 10 --expiry 168h --signaling-url $SIGNALING_URL"
          $LATTICE token create dev-team \
            -n "$NAMESPACE" \
            --limit 10 \
            --expiry 168h \
            --signaling-url "$SIGNALING_URL"
          echo "Token created"

      - name: "[Step 2b] lattice token list — extract token value"
        run: |
          echo ">>> lattice token list -n $NAMESPACE --signaling-url $SIGNALING_URL"
          TOKEN_LIST=$($LATTICE token list -n "$NAMESPACE" --signaling-url "$SIGNALING_URL")
          echo "$TOKEN_LIST"

          TOKEN=$(echo "$TOKEN_LIST" | awk '/^TOKEN/{found=1; next} found && NF>0 {print $1; exit}')
          [[ -n "$TOKEN" ]] || { echo "Failed to extract token"; exit 1; }
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "Token extracted: ${TOKEN:0:8}..."

      # ════════════════════════════════════════════════════════════════════════
      # Step 3: Start agents
      # docker run -d --name wf-agent --restart unless-stopped \
      #   --privileged --network host \
      #   ghcr.io/alatticeio/lattice:latest \
      #   up --signaling-url nats://localhost:4222 --token <token>
      # ════════════════════════════════════════════════════════════════════════

      - name: "Wait for operator to create workspace namespace"
        run: |
          for i in $(seq 1 30); do
            $KUBECTL get ns "$NAMESPACE" &>/dev/null && break || true
            echo "  Waiting for namespace $NAMESPACE... ($i/30)"
            sleep 2
          done
          $KUBECTL get ns "$NAMESPACE" \
            && echo "Namespace $NAMESPACE ready" \
            || { echo "Namespace not created"; $KUBECTL get ns; exit 1; }

      - name: "[Step 3] Start Agent A and Agent B"
        run: |
          # Each agent gets its own network namespace → no wf0 interface conflict.
          # A dedicated bridge lets the two containers reach each other for WireGuard
          # UDP traffic. host.docker.internal resolves to the Docker host gateway so
          # containers can reach the lattice-k3s ports mapped to the host (8080/4222).
          docker network create wf-test-net

          AGENT_NATS="nats://host.docker.internal:4222"
          AGENT_API="http://host.docker.internal:8080"

          echo ">>> docker run -d --name wf-agent-a --privileged --network wf-test-net $AGENT_IMAGE up ..."
          docker run -d \
            --name wf-agent-a \
            --restart unless-stopped \
            --privileged \
            --network wf-test-net \
            --add-host=host.docker.internal:host-gateway \
            -e LATTICE_APP_ID=ci-wf-agent-a \
            "$AGENT_IMAGE" \
            up \
            --signaling-url "$AGENT_NATS" \
            --server-url "$AGENT_API" \
            --token "$TOKEN" \
            --level debug

          echo ">>> docker run -d --name wf-agent-b --privileged --network wf-test-net $AGENT_IMAGE up ..."
          docker run -d \
            --name wf-agent-b \
            --restart unless-stopped \
            --privileged \
            --network wf-test-net \
            --add-host=host.docker.internal:host-gateway \
            -e LATTICE_APP_ID=ci-wf-agent-b \
            "$AGENT_IMAGE" \
            up \
            --signaling-url "$AGENT_NATS" \
            --server-url "$AGENT_API" \
            --token "$TOKEN" \
            --level debug

          echo "Both agent containers started on wf-test-net"

      - name: "Wait for both agents to register"
        run: |
          for i in $(seq 1 36); do
            NODE_COUNT=$($LATTICE workspace list --signaling-url "$SIGNALING_URL" 2>/dev/null \
              | awk '/dev/ {print $4}' || echo 0)
            echo "  Nodes: ${NODE_COUNT:-0}  (attempt $i/36)"
            [[ "${NODE_COUNT:-0}" -ge 2 ]] && break || true
            sleep 5
          done

          FINAL=$($LATTICE workspace list --signaling-url "$SIGNALING_URL")
          echo "$FINAL"
          NODE_COUNT=$(echo "$FINAL" | awk '/dev/ {print $4}')
          [[ "${NODE_COUNT:-0}" -ge 2 ]] \
            && echo "Both agents registered (nodes=$NODE_COUNT)" \
            || { echo "Expected >=2 nodes, got ${NODE_COUNT:-0}"; docker logs wf-agent-a; exit 1; }

      # ════════════════════════════════════════════════════════════════════════
      # Step 4: Allow traffic between peers
      # ════════════════════════════════════════════════════════════════════════

      # Wait for both LatticePeers to have an AllocatedAddress before creating
      # policy — mirrors e2e step 6. Policy matching requires peers to be fully
      # provisioned with a WG IP so the tunnel can be established immediately.
      - name: "Wait for LatticePeer IP allocation"
        run: |
          echo "Waiting for both LatticePeers to have AllocatedAddress (max 90s)..."
          for i in $(seq 1 30); do
            COUNT=$($KUBECTL get wfpeer -n "$NAMESPACE" \
              -o jsonpath='{.items[*].status.allocatedAddress}' 2>/dev/null \
              | tr ' ' '\n' | grep -v '^$' | wc -l || echo 0)
            echo "  Peers with IP: ${COUNT} (attempt $i/30)"
            [[ "${COUNT}" -ge 2 ]] && break || true
            sleep 3
          done
          $KUBECTL get wfpeer -n "$NAMESPACE" -o wide 2>/dev/null || true
          COUNT=$($KUBECTL get wfpeer -n "$NAMESPACE" \
            -o jsonpath='{.items[*].status.allocatedAddress}' 2>/dev/null \
            | tr ' ' '\n' | grep -v '^$' | wc -l || echo 0)
          [[ "${COUNT}" -ge 2 ]] \
            && echo "Both peers have WireGuard IPs" \
            || { echo "LatticePeer IP allocation timed out"; $KUBECTL get wfpeer -n "$NAMESPACE" -o yaml || true; exit 1; }

      - name: "[Step 4a] lattice policy allow-all"
        run: |
          echo ">>> lattice policy allow-all -n $NAMESPACE --signaling-url $SIGNALING_URL"
          $LATTICE policy allow-all -n "$NAMESPACE" --signaling-url "$SIGNALING_URL"
          echo "allow-all policy applied"

      - name: "[Step 4c] lattice policy add"
        run: |
          echo ">>> lattice policy add my-policy -n $NAMESPACE --action ALLOW --signaling-url $SIGNALING_URL"
          $LATTICE policy add my-policy \
            -n "$NAMESPACE" \
            --action ALLOW \
            --desc "allow all peer traffic" \
            --signaling-url "$SIGNALING_URL"
          echo "my-policy added"

      - name: "[Step 4d] lattice policy list"
        run: |
          echo ">>> lattice policy list -n $NAMESPACE --signaling-url $SIGNALING_URL"
          POLICIES=$($LATTICE policy list -n "$NAMESPACE" --signaling-url "$SIGNALING_URL")
          echo "$POLICIES"
          echo "$POLICIES" | grep -q "allow-all" \
            && echo "allow-all present" || { echo "allow-all missing"; exit 1; }
          echo "$POLICIES" | grep -q "my-policy" \
            && echo "my-policy present" || { echo "my-policy missing"; exit 1; }

      # ════════════════════════════════════════════════════════════════════════
      # Step 5: Verify connectivity
      # ════════════════════════════════════════════════════════════════════════

      - name: "[Step 5a] lattice status"
        run: |
          echo "Waiting 20s for WireGuard peer config to be pushed and handshake to complete..."
          sleep 20

          echo "===== latticed logs (last 200 lines) ====="
          $KUBECTL logs -n lattice-system -l app.kubernetes.io/name=latticed --tail=200 2>&1 || true

          echo "===== LatticePeer CRD status ====="
          $KUBECTL get wfpeer -n "$NAMESPACE" -o wide 2>&1 || true

          echo "===== LatticePolicy CRD ====="
          $KUBECTL get wfpolicy -n "$NAMESPACE" -o yaml 2>&1 || true

          echo "--- agent-a container state ---"
          docker inspect wf-agent-a --format '{{.State.Status}} exitCode={{.State.ExitCode}} restarting={{.State.Restarting}}'

          echo "--- agent-b container state ---"
          docker inspect wf-agent-b --format '{{.State.Status}} exitCode={{.State.ExitCode}} restarting={{.State.Restarting}}'

          echo "--- agent-a logs (last 50 lines) ---"
          docker logs wf-agent-a --tail=50 2>&1

          echo "--- agent-b logs (last 50 lines) ---"
          docker logs wf-agent-b --tail=50 2>&1

          echo "--- WireGuard interfaces inside agent-a ---"
          docker exec wf-agent-a ip link show type wireguard 2>&1 || true

          echo "--- ip addr inside agent-a ---"
          docker exec wf-agent-a ip addr 2>&1 || true

          echo "--- WireGuard peers (wg show) inside agent-a ---"
          docker exec wf-agent-a wg show 2>&1 || true

          echo ">>> docker exec wf-agent-a /app/lattice status"
          STATUS=$(docker exec wf-agent-a /app/lattice status 2>&1)
          echo "$STATUS"

          echo "$STATUS" | grep -q "Interface" \
            && echo "Interface present" \
            || { echo "No interface info in status output"; exit 1; }

          echo "--- ip addr inside agent-b ---"
          docker exec wf-agent-b ip addr 2>&1 || true

          echo "--- WireGuard peers (wg show) inside agent-b ---"
          docker exec wf-agent-b wg show 2>&1 || true

          echo ">>> docker exec wf-agent-b /app/lattice status"
          STATUS=$(docker exec wf-agent-b /app/lattice status 2>&1)
          echo "$STATUS"

          echo "$STATUS" | grep -q "Interface" \
            && echo "Interface present" \
            || { echo "No interface info in status output"; exit 1; }

      - name: "[Step 5b] Ping Agent A → Agent B via WireGuard"
        run: |
          # Get Agent B's WireGuard address from the wf0 interface inside the container.
          # lattice status prints: Address  10.x.x.x/24  (field 2 of Address line)
          STATUS_B=$(docker exec wf-agent-b /app/lattice status 2>&1 || true)
          echo "--- agent-b status ---"
          echo "$STATUS_B"

          # Output format: "Address   : 10.0.0.4/32, fe80::..."
          # $1=Address $2=: $3=10.0.0.4/32, — strip comma then CIDR prefix
          WG_IP_B=$(echo "$STATUS_B" | awk '/^Address/{print $3}' | head -1 | cut -d',' -f1 | cut -d'/' -f1)

          if [[ -z "$WG_IP_B" ]]; then
            # Fallback: read wf0 addr directly from inside the container
            WG_IP_B=$(docker exec wf-agent-b \
              ip -4 addr show wf0 2>/dev/null \
              | awk '/inet /{print $2}' | cut -d'/' -f1 || true)
          fi

          echo "Agent B WireGuard IP: ${WG_IP_B:-(unknown)}"

          if [[ -n "$WG_IP_B" ]]; then
            # Retry ping for up to 15s
            echo ">>> ping $WG_IP_B from agent-a (retry up to 3 times)..."
            SUCCESS=0
            for i in $(seq 1 3); do
              echo "  attempt $i/3..."
              if docker exec wf-agent-a ping -c 3 -W 2 "$WG_IP_B" 2>&1; then
                SUCCESS=1
                break
              fi
              sleep 5
            done
            if [[ "$SUCCESS" -eq 1 ]]; then
              echo "Ping succeeded — WireGuard tunnel is working"
            else
              echo "Ping failed after retries"
              docker logs wf-agent-a --tail=50
              docker logs wf-agent-b --tail=50
              exit 1
            fi
          else
            echo "Could not determine Agent B WireGuard IP"
            docker logs wf-agent-b --tail=30
            exit 1
          fi

      # ════════════════════════════════════════════════════════════════════════
      # Step 6: Clean up resources
      # ════════════════════════════════════════════════════════════════════════

      - name: "[Step 6a] lattice token remove"
        run: |
          echo ">>> lattice token remove $TOKEN -n $NAMESPACE --signaling-url $SIGNALING_URL"
          $LATTICE token remove "$TOKEN" -n "$NAMESPACE" --signaling-url "$SIGNALING_URL"
          REMAINING=$($LATTICE token list -n "$NAMESPACE" --signaling-url "$SIGNALING_URL")
          echo "$REMAINING"
          echo "$REMAINING" | grep -q "^$TOKEN" \
            && { echo "Token still present"; exit 1; } \
            || echo "Token removed"

      - name: "[Step 6b] lattice policy remove"
        run: |
          echo ">>> lattice policy remove my-policy -n $NAMESPACE --signaling-url $SIGNALING_URL"
          $LATTICE policy remove my-policy -n "$NAMESPACE" --signaling-url "$SIGNALING_URL"
          POLICIES=$($LATTICE policy list -n "$NAMESPACE" --signaling-url "$SIGNALING_URL")
          echo "$POLICIES"
          echo "$POLICIES" | grep -q "my-policy" \
            && { echo "my-policy still present"; exit 1; } \
            || echo "my-policy removed"

      - name: "[Step 6c] lattice workspace remove"
        run: |
          echo ">>> lattice workspace remove $NAMESPACE --signaling-url $SIGNALING_URL"
          $LATTICE workspace remove "$NAMESPACE" --signaling-url "$SIGNALING_URL"
          WORKSPACES=$($LATTICE workspace list --signaling-url "$SIGNALING_URL")
          echo "$WORKSPACES"
          echo "$WORKSPACES" | grep -q "$NAMESPACE" \
            && { echo "Workspace still present"; exit 1; } \
            || echo "Workspace removed"

      - name: "[Step 6d] Stop containers and clean up"
        run: |
          docker rm -f wf-agent-a wf-agent-b 2>/dev/null || true
          docker network rm wf-test-net 2>/dev/null || true
          docker rm -f lattice-k3s 2>/dev/null || true
          echo "Containers and networks cleaned up"

      # ── Failure diagnostics ───────────────────────────────────────────────

      - name: Collect failure logs
        if: failure()
        run: |
          echo "===== lattice-system pods ====="
          $KUBECTL get all -n lattice-system -o wide || true

          echo "===== latticed logs ====="
          $KUBECTL logs -n lattice-system -l app.kubernetes.io/name=latticed --tail=300 2>&1 || true

          echo "===== workspace namespace ====="
          $KUBECTL get all -n "${NAMESPACE:-unknown}" -o wide || true

          echo "===== LatticePeer CRDs ====="
          $KUBECTL get wfpeer --all-namespaces -o wide || true

          echo "===== Agent A docker logs ====="
          docker logs wf-agent-a --tail=100 2>/dev/null || true

          echo "===== Agent B docker logs ====="
          docker logs wf-agent-b --tail=100 2>/dev/null || true

          echo "===== lattice-k3s container logs ====="
          docker logs lattice-k3s --tail=100 2>/dev/null || true
