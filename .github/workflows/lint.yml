name: lint
on: [pull_request, push]

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Sync Dependencies
        run: go mod download

      - name: Run lint
        run: make lint
