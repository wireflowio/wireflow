name: Wireflow E2E Test

on:
  push:
    branches:
      - dev
  pull_request:
    types: [labeled, opened, synchronize, reopened]
    branches:
      - master
      - main

env:
  REGISTRY: ghcr.io
  # дёҺ Makefile дёӯ LOCAL_CLUSTER_NAME / E2E_KUBECONFIG дҝқжҢҒдёҖиҮҙ
  CLUSTER_NAME: wf-e2e
  E2E_KUBECONFIG: /tmp/wf-e2e.kubeconfig

permissions:
  contents: read
  packages: write

jobs:
  e2e-test:
    # push еҲ° dev еҲҶж”Ҝж—¶зӣҙжҺҘи§ҰеҸ‘пјӣPR йңҖиҰҒжүӢеҠЁжү“ ok-test-e2e ж Үзӯҫ
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e'))

    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # и®Ўз®—й•ңеғҸ Tag е’Ң OwnerпјҲејәеҲ¶е°ҸеҶҷпјҢDocker registry дёҚжҺҘеҸ—еӨ§еҶҷпјү
      - name: Prepare metadata
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=e2e" >> $GITHUB_OUTPUT
          fi

      # зҷ»еҪ•еҲ° GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # жһ„е»әй•ңеғҸпјҡжң¬ең°жһ„е»әжҳҜеҝ…йЎ»зҡ„пјҢжҺЁйҖҒж”№дёәжқЎд»¶жү§иЎҢ
      - name: Build Docker images
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}"
          TAG="${{ steps.meta.outputs.tag }}"
          
          # ж— и®әд»Җд№Ҳжғ…еҶөпјҢе…ҲеңЁ Runner жң¬ең°жһ„е»әй•ңеғҸ
          make docker-build SERVICE=manager  TAG="$TAG" REGISTRY="$REGISTRY"
          make docker-build SERVICE=wireflow TAG="$TAG" REGISTRY="$REGISTRY"
          
          # ж ёеҝғж”№еҠЁпјҡеҸӘжңүйқһ PR дәӢд»¶пјҲеҰӮ push еҲ° devпјүж—¶жүҚжү§иЎҢ push
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "рҹҡҖ Not a PR, pushing images to GHCR..."
            make docker-push SERVICE=manager  TAG="$TAG" REGISTRY="$REGISTRY"
            make docker-push SERVICE=wireflow  TAG="$TAG" REGISTRY="$REGISTRY"
          else
            echo "и·іиҝҮжҺЁйҖҒпјҡеҪ“еүҚдёә PR жөҒзЁӢпјҢй•ңеғҸе°ҶзӣҙжҺҘеҜје…Ҙ k3d йӣҶзҫӨиҝӣиЎҢжөӢиҜ•гҖӮ"
          fi

      # еҗҜеҠЁ k3d йӣҶзҫӨпјҲзҰҒз”Ё TraefikпјҢеҚ• agent иҠӮзӮ№пјү
      - name: Setup k3d cluster
        uses: AbsaOSS/k3d-action@v2
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          args: >-
            --agents 1
            --no-lb
            --k3s-arg "--disable=traefik@server:*"

      # еҜјеҮәйҡ”зҰ»зҡ„ kubeconfigпјҲдёҺжң¬ең° make e2e-setup иЎҢдёәдёҖиҮҙпјү
      - name: Export kubeconfig
        run: |
          k3d kubeconfig get ${{ env.CLUSTER_NAME }} > ${{ env.E2E_KUBECONFIG }}
          echo "KUBECONFIG=${{ env.E2E_KUBECONFIG }}" >> $GITHUB_ENV

      # е°Ҷй•ңеғҸзӣҙжҺҘеҜје…Ҙ k3d containerdпјҢж— йңҖ registry еҮӯиҜҒ
      - name: Import images into k3d
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}"
          TAG="${{ steps.meta.outputs.tag }}"
          k3d image import "${REGISTRY}/manager:${TAG}"  -c ${{ env.CLUSTER_NAME }}
          k3d image import "${REGISTRY}/wireflow:${TAG}" -c ${{ env.CLUSTER_NAME }}

      # е®үиЈ… kustomizeпјҲmake deploy дҫқиө–пјү
      - name: Install kustomize
        run: make kustomize

      # йғЁзҪІ Wireflow ManagerпјҲеӨҚз”Ё make deployпјҢдёҺжң¬ең° make e2e-setup иЎҢдёәдёҖиҮҙпјү
      - name: Deploy Wireflow Manager
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          REGISTRY="${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}"
          TAG="${{ steps.meta.outputs.tag }}"
          make deploy ENV=dev \
            IMG="${REGISTRY}/manager:${TAG}" \
            KUBECTL="kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }}"

      # зӯүеҫ… Manager е…ЁйғЁ Deployment е°ұз»Ә
      - name: Wait for Manager ready
        run: |
          KC="kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }}"
          
          echo "Waiting for NATS to be ready..."
          $KC rollout status deployment -n wireflow-system wireflow-nats --timeout=120s || true
          
          echo "Waiting for Wireflow Manager to be ready..."
          # еўһеҠ еҲ° 5 еҲҶй’ҹпјҢе№¶жҚ•иҺ·е…·дҪ“й”ҷиҜҜ
          if ! $KC rollout status deployment -n wireflow-system wireflow-control --timeout=300s; then
            echo "вқҢ Manager failed to ready in time. Current Pod status:"
            $KC get pods -n wireflow-system
            $KC describe pods -n wireflow-system -l app.kubernetes.io/name=wireflow-manager
            exit 1
          fi

      # иҝҗиЎҢ E2E жөӢиҜ•пјҲдёҺжң¬ең° make test-e2e е®Ңе…ЁдёҖиҮҙпјҡport-forward еңЁ go test еҶ…з”ұ Makefile з®ЎзҗҶпјү
      - name: Run E2E tests
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}"
          TAG="${{ steps.meta.outputs.tag }}"
          make test-e2e \
            LOCAL_AGENT_IMAGE="${REGISTRY}/wireflow:${TAG}" \
            E2E_KUBECONFIG="${{ env.E2E_KUBECONFIG }}"

      # еӨұиҙҘж—¶ж”¶йӣҶе®Ңж•ҙиҜҠж–ӯж—Ҙеҝ—
      - name: Collect failure logs
        if: failure()
        run: |
          KC="kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }}"

          echo "===== pods in wireflow-system ====="
          $KC get all -n wireflow-system || true

          echo "===== Manager logs ====="
          # зЎ®дҝқиҝҷйҮҢзҡ„ Label дёҺдҪ  YAML йҮҢзҡ„е®ҡд№үдёҖиҮҙ
          $KC logs -n wireflow-system -l app.kubernetes.io/name=wireflow-manager --tail=200 || true

          echo "===== NATS logs ====="
          $KC logs -n wireflow-system -l app.kubernetes.io/name=wireflow-nats --tail=100 || true

          echo "===== E2E test namespaces ====="
          # иҺ·еҸ–жүҖжңүд»Ҙ wf- ејҖеӨҙзҡ„е‘ҪеҗҚз©әй—ҙеҗҚ
          # дҪҝз”Ё grep "^namespace/wf-" зЎ®дҝқеҢ№й…Қзҡ„жҳҜеүҚзјҖ
          NAMESPACES=$($KC get ns -o name | grep "^namespace/wf-" | cut -d/ -f2 || true)
          
          for ns in $NAMESPACES; do
            echo "========================================="
            echo "рҹ”Қ Checking namespace: $ns"
            echo "========================================="
          
            # жү“еҚ°иө„жәҗеҲ—иЎЁ
            $KC get all -n "$ns" -o wide || true
          
            # жү“еҚ°иҜҰз»ҶзҠ¶жҖҒпјҲеҢ…еҗ« EventsпјҢз”ЁдәҺжҺ’жҹҘ Pending/Crash еҺҹеӣ пјү
            echo "--- Pod Details for $ns ---"
            $KC describe pods -n "$ns" || true
          
            # йҒҚеҺҶе№¶жү“еҚ°ж—Ҙеҝ—
            PODS=$($KC get pods -n "$ns" -o jsonpath='{.items[*].metadata.name}' || true)
            for pod in $PODS; do
              echo "-----------------------------------------"
              echo "рҹ“Ӣ Logs for Pod: $pod (Namespace: $ns)"
              echo "-----------------------------------------"
              $KC logs -n "$ns" "$pod" --all-containers --tail=100 || true
            done
          done

          echo "===== WireflowPeer CRDs ====="
          $KC get wfpeer --all-namespaces || true

      # еӨұиҙҘж—¶жё…зҗҶж®Ӣз•ҷжөӢиҜ• NamespaceпјҢйҒҝе…ҚеҪұе“ҚдёӢж¬ЎиҝҗиЎҢ
      - name: Cleanup test namespaces on failure
        if: failure()
        run: |
          kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }} \
            get ns -o name | grep "namespace/wf-test-" \
            | xargs -r kubectl --kubeconfig=${{ env.E2E_KUBECONFIG }} \
            delete --ignore-not-found=true --timeout=60s || true
